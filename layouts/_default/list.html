{{ define "main" }}
<article class="py-16 md:py-24">
  <div class="container-narrow">
    <header class="mb-12 text-center">
      <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold text-blue-deep mb-4">
        {{ .Title }}
      </h1>
      {{ with .Description }}
      <p class="text-lg text-gray-600 max-w-2xl mx-auto leading-relaxed">
        {{ . }}
      </p>
      {{ end }}
    </header>

    {{ with .Content }}
    <div class="prose prose-lg mx-auto text-gray-700 max-w-3xl">
      {{ . }}
    </div>
    {{ end }}
  </div>
</article>
{{ end }}
