baseURL = "https://alignmentethics.org/"
languageCode = "en-us"
title = "Alignment Ethics Institute"

# Site parameters
[params]
  description = "What happens to alignment when AI is more capable than we are? We develop ethical frameworks and governance structures designed to remain stable regardless of who holds more power."
  ogImage = "/images/logo.png"

