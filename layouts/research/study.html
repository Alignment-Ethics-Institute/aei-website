{{ define "main" }}
<article class="py-12 md:py-20">
  <div class="container-narrow">
    <header class="mb-12 text-center">
      <h1 class="text-2xl sm:text-3xl lg:text-4xl font-bold text-blue-deep mb-4 leading-tight" data-testid="page-title">
        {{ .Title }}
      </h1>
      {{ with .Params.description }}
      <p class="text-lg text-gray-600 max-w-2xl mx-auto leading-relaxed">{{ . }}</p>
      {{ end }}
    </header>

    {{ with .Content }}
    <div class="prose prose-lg mx-auto text-gray-700 max-w-3xl" data-testid="page-content">
      {{ . }}
    </div>
    {{ end }}
  </div>
</article>
{{ end }}
